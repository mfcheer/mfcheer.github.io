  <div class="post-content">
    <p>不获取返回结果：<br><figure class="highlight moonscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> <span class="built_in">os</span></span><br><span class="line"></span><br><span class="line"><span class="built_in">os</span>.system(<span class="string">"sh /path/xx.sh '%s'"</span> %(params))</span><br></pre></td></tr></table></figure></p>
<p>获取返回结果：<br><figure class="highlight lua"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">import commands</span><br><span class="line"></span><br><span class="line">(<span class="built_in">status</span>,<span class="built_in">output</span>) = commands.getstatusoutput(<span class="string">"/path/xx.sh '%s'"</span> %(params))</span><br><span class="line"><span class="built_in">status</span>是返回状态</span><br><span class="line"><span class="built_in">output</span>是返回结果</span><br></pre></td></tr></table></figure></p>
