    <p>不获取返回结果：<br><figure class="highlight moonscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre class="line-numbers language-hljs undefined"><span class="hljs-keyword">import</span> <span class="hljs-built_in">os</span><br><br><span class="hljs-built_in">os</span>.system(<span class="hljs-string"><code class="language-hljs undefined"><span class="hljs-keyword">import</span> <span class="hljs-built_in">os</span><br><br><span class="hljs-built_in">os</span>.system(<span class="hljs-string">"sh /path/xx.sh '%s'"</span> %(params))<br><span aria-hidden="true" class="line-numbers-rows"><span></span></span></code></pre></td></tr></table></figure></p>
<p>获取返回结果：<br><figure class="highlight lua"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre class="line-numbers language-hljs undefined">import commands<br><br>(<span class="hljs-built_in">status</span>,<span class="hljs-built_in">output</span>) = commands.getstatusoutput(<span class="hljs-string">"/path/xx.sh '%s'"</span> %(params))<br><span class="hljs-built_in">status</span>是返回状态<br><span class="hljs-built_in"><code class="language-hljs undefined">import commands<br><br>(<span class="hljs-built_in">status</span>,<span class="hljs-built_in">output</span>) = commands.getstatusoutput(<span class="hljs-string">"/path/xx.sh '%s'"</span> %(params))<br><span class="hljs-built_in">status</span>是返回状态<br><span class="hljs-built_in">output</span>是返回结果<br><span aria-hidden="true" class="line-numbers-rows"><span></span></span></code></pre></td></tr></table></figure></p>
