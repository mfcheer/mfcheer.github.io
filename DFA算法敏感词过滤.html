    <span style="text-align: center;display:block;font-size:24px;font-weight:bold" class="article--title">DFA算法敏感词过滤</span>
	<br>
  </div>
  <div class="post-meta">
  </div>
  <div class="post-content">
    <p>DFA全称为：Deterministic Finite Automaton,即确定有穷自动机。其特征为：有一个有限状态集合和一些从一个状态通向另一个状态的边，每条边上标记有一个符号，其中一个状态是初态，某些状态是终态。但不同于不确定的有限自动机，DFA中不会有从同一状态出发的两条边标志有相同的符号。常常应用于敏感词过滤，具体的细节原理可以在网上搜到很多，这里就不具体说了。</p>
<p>下面给出简单的实现。</p>
<p>简单实现代码：</p>

">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> java.util.ArrayList;</span><br><span class="line"><span class="keyword">import</span> java.util.<span class="keyword">HashMap</span>;</span><br><span class="line"><span class="keyword">import</span> java.util.HashSet;</span><br><span class="line"><span class="keyword">import</span> java.util.Map;</span><br><span class="line"><span class="keyword">import</span> java.util.Set;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">public</span> class DFA &#123;</span><br><span class="line">	</span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">static</span> Map&lt;<span class="keyword">String</span>,<span class="keyword">String</span>&gt; sensitiveWordsMap = <span class="keyword">new</span> <span class="keyword">HashMap</span>&lt;<span class="keyword">String</span>, <span class="keyword">String</span>&gt;();  </span><br><span class="line">	</span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">void</span> addSensitiveWords(Set&lt;<span class="keyword">String</span>&gt; wordSet)&#123; </span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">String</span> word : wordSet) &#123;  </span><br><span class="line">            Map nowMap = sensitiveWordsMap;  </span><br><span class="line">            <span class="keyword">for</span> (<span class="built_in">int</span> i = <span class="number">0</span>; i &lt; word.length(); i++) &#123;  </span><br><span class="line">                <span class="built_in">char</span> keyChar = word.charAt(i);  </span><br><span class="line">                <span class="keyword">Object</span> nextMap = nowMap.<span class="built_in">get</span>(keyChar);  </span><br><span class="line">                <span class="keyword">if</span> (nextMap != <span class="keyword">null</span>) &#123;</span><br><span class="line">                    nowMap = (Map&lt;<span class="keyword">String</span>,<span class="keyword">String</span>&gt;) nextMap;  </span><br><span class="line">                &#125;<span class="keyword">else</span> &#123;  </span><br><span class="line">                    Map&lt;<span class="keyword">String</span>, <span class="keyword">String</span>&gt; newMap = <span class="keyword">new</span> <span class="keyword">HashMap</span>&lt;<span class="keyword">String</span>, <span class="keyword">String</span>&gt;();  </span><br><span class="line">                    newMap.put(<span class="string">"isEnd"</span>, <span class="string">"0"</span>);  </span><br><span class="line">                    nowMap.put(keyChar, newMap);  </span><br><span class="line">                    nowMap = newMap;  </span><br><span class="line">                &#125; </span><br><span class="line">                </span><br><span class="line">                <span class="keyword">if</span> (i == word.length() - <span class="number">1</span>) &#123;  </span><br><span class="line">                    nowMap.put(<span class="string">"isEnd"</span>, <span class="string">"1"</span>);  </span><br><span class="line">                &#125;</span><br><span class="line">            &#125;  </span><br><span class="line">        &#125;</span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">	 <span class="keyword">public</span> <span class="built_in">boolean</span> isSensitiveWord(<span class="keyword">String</span> word) &#123;  </span><br><span class="line">	        Map nowMap = sensitiveWordsMap;</span><br><span class="line">	        </span><br><span class="line">	        <span class="keyword">for</span>(<span class="built_in">int</span> i=<span class="number">0</span>;i&lt;word.length();i++)&#123;</span><br><span class="line">	        	<span class="built_in">char</span> keyChar = word.charAt(i);</span><br><span class="line">	        	nowMap = (Map) nowMap.<span class="built_in">get</span>(keyChar);</span><br><span class="line">	        	<span class="keyword">if</span>(nowMap == <span class="keyword">null</span>)</span><br><span class="line">	        		<span class="keyword">return</span> <span class="keyword">false</span>;</span><br><span class="line">	        	<span class="keyword">if</span>(nowMap.<span class="built_in">get</span>(<span class="string">"isEnd"</span>).equals(<span class="string">"1"</span>))&#123;</span><br><span class="line">	        		<span class="keyword">return</span> <span class="keyword">true</span>;</span><br><span class="line">	        	&#125;</span><br><span class="line">	        &#125;</span><br><span class="line">			<span class="keyword">return</span> <span class="keyword">false</span>;</span><br><span class="line">	&#125;   </span><br><span class="line">	</span><br><span class="line">	<span class="keyword">public</span> <span class="built_in">boolean</span> isContainSensitiveWord(<span class="keyword">String</span> txt)&#123;</span><br><span class="line">		<span class="keyword">for</span>(<span class="built_in">int</span> i=<span class="number">0</span>; i &lt; txt.length(); i++)&#123;</span><br><span class="line">			<span class="keyword">String</span> subTxt = txt.substring(i);</span><br><span class="line">			<span class="keyword">if</span>(isSensitiveWord(subTxt))</span><br><span class="line">				<span class="keyword">return</span> <span class="keyword">true</span>;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">return</span> <span class="keyword">false</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	 </span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> main(<span class="keyword">String</span>[] args)&#123;</span><br><span class="line">		Set&lt;<span class="keyword">String</span>&gt; wordSet = <span class="keyword">new</span> HashSet&lt;<span class="keyword">String</span>&gt;();</span><br><span class="line">		wordSet.<span class="built_in">add</span>(<span class="string">"赌博"</span>);</span><br><span class="line">		wordSet.<span class="built_in">add</span>(<span class="string">"赌博赌博"</span>);</span><br><span class="line">		wordSet.<span class="built_in">add</span>(<span class="string">"嫖娼"</span>);</span><br><span class="line">		wordSet.<span class="built_in">add</span>(<span class="string">"毒品"</span>);</span><br><span class="line">		wordSet.<span class="built_in">add</span>(<span class="string">"枪支"</span>);</span><br><span class="line">		</span><br><span class="line">		DFA dfa = <span class="keyword">new</span> DFA();</span><br><span class="line">		<span class="comment">//添加敏感词</span></span><br><span class="line">		dfa.addSensitiveWords(wordSet);</span><br><span class="line">		System.out.<span class="built_in">println</span>(sensitiveWordsMap.toString());</span><br><span class="line">		</span><br><span class="line">		<span class="comment">//查询测试</span></span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"赌博"</span>));</span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"赌博赌"</span>));</span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"博赌"</span>));</span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"赌&amp;博"</span>));</span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"赌博不许"</span>));</span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"不许赌博"</span>));</span><br><span class="line">		System.out.<span class="built_in">println</span>(dfa.isContainSensitiveWord(<span class="string">"&amp;赌博&amp;嫖娼&amp;毒品&amp;枪支&amp;"</span>));</span><br><span class="line"> 	&#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">&#123;枪=&#123;支=&#123;isEnd=1&#125;, isEnd=0&#125;, 赌=&#123;isEnd=0, 博=&#123;isEnd=1, 赌=&#123;isEnd=0, 博=&#123;isEnd=1&#125;&#125;&#125;&#125;, </span></span><br><span class="line"><span class="comment">嫖=&#123;isEnd=0, 娼=&#123;isEnd=1&#125;&#125;, 毒=&#123;品=&#123;isEnd=1&#125;, isEnd=0&#125;&#125;</span></span><br><span class="line"><span class="comment">true</span></span><br><span class="line"><span class="comment">true</span></span><br><span class="line"><span class="comment">false</span></span><br><span class="line"><span class="comment">false</span></span><br><span class="line"><span class="comment">true</span></span><br><span class="line"><span class="comment">true</span></span><br><span class="line"><span class="comment">true</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>
