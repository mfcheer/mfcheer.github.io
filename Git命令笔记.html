  <div class="post-content">
    <h1 id="连接GitHub"><a href="#连接GitHub" class="headerlink" title="连接GitHub"></a>连接GitHub</h1><figure class="highlight vbnet"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">创建SSH <span class="keyword">Key</span>，在用户主目录（~）下创建SSH <span class="keyword">Key</span>: </span><br><span class="line">ssh-keygen -t rsa -C “youremail@example.com”</span><br><span class="line">然后一路回车使用默认值即可。</span><br><span class="line">执行完之后，我们可以找到.ssh目录，里面有id_rsa和id_rsa.pub两个文件，这两个就是SSH <span class="keyword">Key</span>的密钥对，id_rsa是私钥，id_rsa.pub是公钥。</span><br><span class="line">登录GitHub，打开”Account settings”，找到”SSH Keys”页面，点击”Add SSH <span class="keyword">Key</span>”，把id_rsa.pub文件中的内容粘贴过来。</span><br></pre></td></tr></table></figure>
<a id="more"></a>
<h1 id="创建版本库-Repository"><a href="#创建版本库-Repository" class="headerlink" title="创建版本库(Repository)"></a>创建版本库(Repository)</h1><figure class="highlight dockerfile"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">新建一个目录: mkdir my_dir &amp;&amp; cd my_dir</span><br><span class="line">用 git init 把目录变成Git可以管理Repository</span><br><span class="line">git clone: 克隆已有的远端仓库</span><br><span class="line">git <span class="keyword">add</span><span class="bash"> filename 将文件添加到仓库</span></span><br><span class="line"><span class="bash">git commit -m “xxxxx” 告诉Git把文件提交到Repository </span></span><br><span class="line"><span class="bash">git add 命令可以执行多次，添加多个文件到仓库 </span></span><br><span class="line"><span class="bash">git commit 命令中 -m 后面输入的是本次提交的说明，可以输入任意内容</span></span><br><span class="line"><span class="bash">版本修改</span></span><br><span class="line"><span class="bash">git status 命令查看Repository当前的状态</span></span><br><span class="line"><span class="bash">git diff filename 查看修改过的但还没提交的文件与已经commit到仓库中的区别</span></span><br><span class="line"><span class="bash">git <span class="built_in">log</span> 查看从最近到最远的提交日志</span></span><br></pre></td></tr></table></figure>
<h1 id="分支"><a href="#分支" class="headerlink" title="分支"></a>分支</h1><figure class="highlight armasm"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="symbol">git</span> <span class="keyword">branch: </span>查看所有本地分支，带*的是当前分支。</span><br><span class="line"><span class="symbol">git</span> checkout –<span class="keyword">b </span>dev: 以当前分支为基础，创建一个新的dev分支，并切换到dev.</span><br><span class="line"><span class="symbol">git</span> checkout $&#123;<span class="keyword">br_name&#125;: </span>切换到名为$&#123;<span class="keyword">br_name&#125;的分支。</span></span><br><span class="line"><span class="keyword">git </span><span class="keyword">branch </span>-a: 查看所有分支，包括远端</span><br><span class="line"><span class="symbol">git</span> merge $&#123;<span class="keyword">br_name&#125;: </span>把分支$&#123;<span class="keyword">br_name&#125;的最新内容合并到当前分支</span></span><br></pre></td></tr></table></figure>
<h1 id="工作区"><a href="#工作区" class="headerlink" title="工作区"></a>工作区</h1><figure class="highlight tcl"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">工作区（Working Directory）和版本库（Repository）的区别 </span><br><span class="line">工作区就是指的某个目录，例如上面的my_dir。</span><br><span class="line">在my_dir中有一个隐藏目录.git，这个就是版本库。 </span><br><span class="line">版本库中最重要的就是被称为stage（或者index）的暂存区，还有Git为我们自动创建的第一个分支master以及指向master的指针HEAD。</span><br><span class="line">git add 命令就是把文件添加的暂存区</span><br><span class="line">git commit 命令提交更改后，就是把暂存区的所有内容提交到当前分支</span><br><span class="line">git checkout – <span class="keyword">filename</span> 命令可以把文件在工作区的修改全部撤消掉，有两种情况： </span><br><span class="line">一种是<span class="keyword">filename</span>文件修改后还没添加到暂存区，撤消修改之后就和版本库一样。</span><br><span class="line">一种是<span class="keyword">filename</span>文件修改后添加到暂存区，撤消修改之后就回到添加到暂存区后的状态。</span><br><span class="line">当在工作区把某个文件删除了之后，版本库中还存在，这时用git status 命令可以看到版本库中那些文件在工作区被删除了，这时有两种选择： </span><br><span class="line">一种是确实要删除某个文件，那么版本库中也应该相应删除，可以使用git rm <span class="keyword">filename</span> 并且git commit -m “xxxx” 命令在版本库中删除。</span><br><span class="line">另一种是删错了，那么可以使用git checkout – <span class="keyword">filename</span> 命令把工作区误删的文件恢复到最新版。</span><br></pre></td></tr></table></figure>
<h1 id="远程仓库"><a href="#远程仓库" class="headerlink" title="远程仓库"></a>远程仓库</h1><figure class="highlight crmsh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">git remote add origin git@github.com:xxxx/xxxx.git 命令将本地仓库与GitHub仓库关联。 </span><br><span class="line">执行之后，远程库的名字就是origin。</span><br><span class="line">git pull 把远程仓库的东西pull到本地</span><br><span class="line">git push -u origin <span class="keyword">master</span> <span class="title">命令把本地库中的所有内容推送到远程库中。 </span></span><br><span class="line"><span class="title">git</span> push 命令就是把当前分支<span class="literal">master</span>推送到远程</span><br><span class="line">由于一开始远程库是空的，-u参数不仅能够将本地<span class="literal">master</span>分支内容推送到远程新的<span class="literal">master</span>分支，还会把本地的<span class="literal">master</span>分支和远程的<span class="literal">master</span>分支关联起来，在以后的推送和拉取时就可以简化命令。</span><br><span class="line">之后就可以用git push origin <span class="keyword">master</span> <span class="title">命令了。</span></span><br><span class="line"><span class="title">注意可以用git</span> push -f命令来强制推送。</span><br><span class="line">git <span class="keyword">clone</span> <span class="title">git</span>@github.com:xxxx/xxxx.git 命令从远程库中克隆一个到本地仓库</span><br><span class="line">git fetch [origin] [br_name]: 从远端仓库origin拉取分支br_name的最新代码到本地。用于更新本地代码。</span><br><span class="line">git pull = git fetch + git merge</span><br></pre></td></tr></table></figure>
<h1 id="缓存回滚"><a href="#缓存回滚" class="headerlink" title="缓存回滚"></a>缓存回滚</h1><figure class="highlight maxima"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">git stash: 把当前分支上的修改缓存起来，得到一个干净的working <span class="built_in">directory</span>。缓存是独立于分支的，可以在任何分支git stash <span class="built_in">pop</span>恢复最近的被缓存起来的修改。</span><br><span class="line">git <span class="built_in">reset</span>: 对于未<span class="built_in">push</span>到远端的修改，优先使用这个。</span><br><span class="line">git <span class="built_in">revert</span>: 对于<span class="built_in">push</span>到远端的修改。</span><br></pre></td></tr></table></figure>
<h1 id="常见错误"><a href="#常见错误" class="headerlink" title="常见错误"></a>常见错误</h1><figure class="highlight subunit"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">error: </span>failed to push some refs to ...</span><br><span class="line">出现错误的主要原因是github中的README.md文件不在本地代码目录中</span><br><span class="line">可以通过如下命令进行代码合并【注：pull=fetch+merge]</span><br><span class="line">git pull --rebase origin master</span><br></pre></td></tr></table></figure>
<figure class="highlight routeros"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">提交代码成功后并不显示绿格子</span><br><span class="line">原因是本地Git的配置邮箱和github上面的邮箱不一致。</span><br><span class="line">git<span class="built_in"> config </span>--global user.name <span class="string">"youname"</span></span><br><span class="line">git<span class="built_in"> config </span>--global user.email <span class="string">"youeamil@email.com"</span></span><br></pre></td></tr></table></figure>
