<p>判断二分图,染色法，选取某个点作为起点并染为某种颜色、同时把与它相邻的元素染为对立的颜色，进行BFS，如果到那步发现当前点和相邻点的颜色一样，那么就出现了矛盾，就不是二分图。</p>
